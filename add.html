<!DOCTYPE html>

<html dir="rtl" lang="he">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700&amp;display=swap" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed-variant": "#7f2448",
                        "on-tertiary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-fixed": "#001c3a",
                        "secondary-container": "#54a0fe",
                        "inverse-on-surface": "#eef2e8",
                        "surface-bright": "#f7fbf0",
                        "on-primary-container": "#cbffc2",
                        "on-surface-variant": "#40493d",
                        "on-secondary-container": "#003567",
                        "error": "#ba1a1a",
                        "error-container": "#ffdad6",
                        "on-primary": "#ffffff",
                        "outline": "#707a6c",
                        "secondary-fixed-dim": "#a5c8ff",
                        "tertiary-fixed": "#ffd9e2",
                        "on-primary-fixed-variant": "#005312",
                        "primary-fixed-dim": "#88d982",
                        "surface-dim": "#d7dbd2",
                        "surface-container": "#ebefe5",
                        "primary-fixed": "#a3f69c",
                        "inverse-surface": "#2d322b",
                        "inverse-primary": "#88d982",
                        "secondary": "#005faf",
                        "on-secondary": "#ffffff",
                        "surface-container-low": "#f1f5eb",
                        "on-primary-fixed": "#002204",
                        "secondary-fixed": "#d4e3ff",
                        "background": "#f7fbf0",
                        "on-surface": "#181d17",
                        "surface-container-highest": "#e0e4da",
                        "outline-variant": "#bfcaba",
                        "on-secondary-fixed-variant": "#004786",
                        "primary": "#0d631b",
                        "primary-container": "#2e7d32",
                        "surface-container-high": "#e5eadf",
                        "surface-tint": "#1b6d24",
                        "surface": "#f7fbf0",
                        "on-error": "#ffffff",
                        "surface-variant": "#e0e4da",
                        "tertiary": "#923357",
                        "on-background": "#181d17",
                        "tertiary-container": "#b14b6f",
                        "on-tertiary-container": "#ffedf0",
                        "on-error-container": "#93000a",
                        "on-tertiary-fixed": "#3f001c",
                        "tertiary-fixed-dim": "#ffb1c7"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "sm": "8px",
                        "lg": "24px",
                        "base": "8px",
                        "md": "16px",
                        "xl": "32px",
                        "xs": "4px",
                        "container-margin": "16px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "caption-sm": ["Heebo"],
                        "caption-md": ["Heebo"],
                        "body-sm": ["Heebo"],
                        "body-base": ["Heebo"],
                        "headline-md": ["Heebo"],
                        "headline-sm": ["Heebo"],
                        "headline-lg": ["Heebo"]
                    },
                    "fontSize": {
                        "caption-sm": ["12px", { "lineHeight": "1.2", "fontWeight": "500" }],
                        "caption-md": ["14px", { "lineHeight": "1.2", "fontWeight": "500" }],
                        "body-sm": ["14px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "body-base": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "headline-md": ["28px", { "lineHeight": "1.2", "fontWeight": "700" }],
                        "headline-sm": ["24px", { "lineHeight": "1.3", "fontWeight": "700" }],
                        "headline-lg": ["32px", { "lineHeight": "1.2", "fontWeight": "700" }]
                    }
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Heebo', sans-serif;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>

<body class="bg-background text-on-background min-h-screen pb-24">
    <!-- TopNavBar -->
    <header
        class="bg-white dark:bg-zinc-900 border-b border-zinc-200 dark:border-zinc-800 shadow-sm fixed top-0 w-full z-50">
        <div class="flex justify-between items-center px-4 h-16 w-full max-w-7xl mx-auto">
            <div class="flex items-center gap-4">
                <button
                    class="p-2 hover:bg-zinc-50 dark:hover:bg-zinc-800 transition-colors rounded-full active:opacity-80">
                    <span class="material-symbols-outlined text-zinc-600 dark:text-zinc-400">arrow_forward</span>
                </button>
                <h1 class="text-xl font-bold text-green-800 dark:text-green-400 tracking-tight">Sharehood</h1>
            </div>
            <div class="flex items-center gap-sm">
                <button
                    class="p-2 hover:bg-zinc-50 dark:hover:bg-zinc-800 transition-colors rounded-full active:opacity-80">
                    <span class="material-symbols-outlined text-zinc-600 dark:text-zinc-400">notifications</span>
                </button>
                <button
                    class="p-2 hover:bg-zinc-50 dark:hover:bg-zinc-800 transition-colors rounded-full active:opacity-80">
                    <span class="material-symbols-outlined text-zinc-600 dark:text-zinc-400">account_circle</span>
                </button>
            </div>
        </div>
    </header>
    <main class="pt-20 px-container-margin max-w-2xl mx-auto">
        <header class="mb-lg">
            <h2 class="font-headline-md text-headline-md text-primary">הוספת פריט חדש</h2>
            <p class="font-body-sm text-body-sm text-on-surface-variant">שתפו ציוד עם השכנים שלכם ועזרו לבנות קהילה חזקה
                יותר.</p>
        </header>
        <form class="space-y-lg">
            <!-- Image Upload Section (Bento Style) -->
            <div class="bg-white p-md rounded-xl shadow-[0_4px_8px_rgba(0,0,0,0.08)] border border-outline-variant/30">
                <label class="block font-headline-sm text-headline-sm mb-sm">תמונות הפריט</label>
                <div class="grid grid-cols-3 gap-sm h-48">
                    <div
                        class="col-span-2 relative group cursor-pointer overflow-hidden rounded-lg border-2 border-dashed border-outline-variant flex flex-col items-center justify-center bg-surface-container-lowest hover:border-secondary transition-colors">
                        <span class="material-symbols-outlined text-4xl text-outline mb-xs">add_a_photo</span>
                        <p class="font-caption-md text-caption-md text-outline">לחץ להוספת תמונה ראשית</p>
                    </div>
                    <div class="flex flex-col gap-sm">
                        <div
                            class="h-1/2 rounded-lg border-2 border-dashed border-outline-variant flex items-center justify-center bg-surface-container-lowest">
                            <span class="material-symbols-outlined text-outline">add</span>
                        </div>
                        <div
                            class="h-1/2 rounded-lg border-2 border-dashed border-outline-variant flex items-center justify-center bg-surface-container-lowest">
                            <span class="material-symbols-outlined text-outline">add</span>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Basic Details -->
            <div class="bg-white p-md rounded-xl shadow-[0_4px_8px_rgba(0,0,0,0.08)] space-y-md">
                <div>
                    <label class="block font-caption-md text-caption-md text-on-surface mb-xs" for="title">שם
                        הפריט</label>
                    <input
                        class="w-full px-md py-sm rounded-lg border border-outline-variant focus:ring-2 focus:ring-secondary focus:border-secondary font-body-base text-body-base"
                        id="title" placeholder="לדוגמה: מקדחה נטענת מקיטה" type="text" />
                </div>
                <div>
                    <label class="block font-caption-md text-caption-md text-on-surface mb-xs" for="description">תיאור
                        הפריט</label>
                    <textarea
                        class="w-full px-md py-sm rounded-lg border border-outline-variant focus:ring-2 focus:ring-secondary focus:border-secondary font-body-base text-body-base"
                        id="description" placeholder="ספרו קצת על הפריט, המצב שלו וכל פרט חשוב אחר..."
                        rows="3"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-md">
                    <div>
                        <label class="block font-caption-md text-caption-md text-on-surface mb-xs"
                            for="category">קטגוריה</label>
                        <select
                            class="w-full px-md py-sm rounded-lg border border-outline-variant focus:ring-2 focus:ring-secondary focus:border-secondary font-body-base text-body-base"
                            id="category">
                            <option>כלי עבודה</option>
                            <option>קמפינג</option>
                            <option>גינון</option>
                            <option>מטבח</option>
                            <option>אלקטרוניקה</option>
                        </select>
                    </div>
                    <div>
                        <label class="block font-caption-md text-caption-md text-on-surface mb-xs" for="price">מחיר ליום
                            (₪)</label>
                        <input
                            class="w-full px-md py-sm rounded-lg border border-outline-variant focus:ring-2 focus:ring-secondary focus:border-secondary font-body-base text-body-base"
                            id="price" placeholder="0" type="number" />
                    </div>
                </div>
            </div>
            <!-- Location & Contact -->
            <div class="bg-white p-md rounded-xl shadow-[0_4px_8px_rgba(0,0,0,0.08)] space-y-md">
                <div class="relative">
                    <label class="block font-caption-md text-caption-md text-on-surface mb-xs" for="location">מיקום
                        גיאוגרפי</label>
                    <div class="relative">
                        <input
                            class="w-full pr-xl pl-md py-sm rounded-lg border border-outline-variant focus:ring-2 focus:ring-secondary focus:border-secondary font-body-base text-body-base"
                            id="location" placeholder="חפש כתובת או שכונה..." type="text" />
                        <span
                            class="material-symbols-outlined absolute right-sm top-1/2 -translate-y-1/2 text-outline">location_on</span>
                    </div>
                    <div class="mt-sm h-32 w-full rounded-lg overflow-hidden relative">
                        <img class="w-full h-full object-cover grayscale opacity-60"
                            data-alt="A clean, minimalist map interface showing a suburban neighborhood layout with soft green and grey tones. The map has a modern light-mode aesthetic with a central location pin in deep green. The lighting is bright and clear, emphasizing transparency and ease of navigation in a corporate modern style."
                            src="https://lh3.googleusercontent.com/aida-public/AB6AXuAJh2beUNyv7zarHz2i6wD3-vLyAW8YyK0eyu_JoSzdiX_fVA0SfMsJ2cYhJSYCMeSnGCqggN02mPZCPbr5gqLBxM6BlypQgi8TEMNi7MbaZDteZgABtFQWL0ZhH_vtkZfwW0jbaabMSM5IIA4hRK62CW1uqDzDkSbk7S_7xX4ue2nD5T4dBW1JPTKBdYwNtSrxvS_xX4VgIj_xwp_Ts1TIsEw9v3UpWfCUTfGsmua61m4VRV3ILLesGnIiMWyV2xsWR8P2rl7EqoE" />
                        <div class="absolute inset-0 flex items-center justify-center bg-black/5">
                            <span
                                class="bg-white px-md py-sm rounded-full shadow-md font-caption-md text-caption-md flex items-center gap-xs">
                                <span class="material-symbols-outlined text-primary text-sm">my_location</span>
                                השתמש במיקום הנוכחי
                            </span>
                        </div>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-md">
                    <div>
                        <label class="block font-caption-md text-caption-md text-on-surface mb-xs" for="owner_name">שם
                            הבעלים</label>
                        <input
                            class="w-full px-md py-sm rounded-lg border border-outline-variant focus:ring-2 focus:ring-secondary focus:border-secondary font-body-base text-body-base"
                            id="owner_name" placeholder="השם שלך" type="text" />
                    </div>
                    <div>
                        <label class="block font-caption-md text-caption-md text-on-surface mb-xs" for="phone">מספר
                            טלפון</label>
                        <input
                            class="w-full px-md py-sm rounded-lg border border-outline-variant focus:ring-2 focus:ring-secondary focus:border-secondary font-body-base text-body-base text-left"
                            dir="ltr" id="phone" placeholder="050-0000000" type="tel" />
                    </div>
                </div>
            </div>
            <!-- Submit Action -->
            <div class="pt-md">
                <button
                    class="w-full bg-primary text-on-primary py-md rounded-xl font-headline-sm text-headline-sm shadow-lg active:scale-95 transition-transform"
                    type="submit">
                    פרסום הפריט למכירה/השאלה
                </button>
            </div>
        </form>
    </main>
    <!-- BottomNavBar -->
    <nav
        class="fixed bottom-0 left-0 w-full flex justify-around items-center h-16 px-2 bg-white dark:bg-zinc-900 border-t border-zinc-200 dark:border-zinc-800 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.08)] z-50">
        <a class="flex flex-col items-center justify-center text-zinc-500 dark:text-zinc-400 pt-1 hover:text-blue-500 active:scale-95 transition-all"
            href="#">
            <span class="material-symbols-outlined">search</span>
            <span class="font-medium text-[10px] uppercase tracking-wider">Explore</span>
        </a>
        <a class="flex flex-col items-center justify-center text-zinc-500 dark:text-zinc-400 pt-1 hover:text-blue-500 active:scale-95 transition-all"
            href="#">
            <span class="material-symbols-outlined">grid_view</span>
            <span class="font-medium text-[10px] uppercase tracking-wider">Board</span>
        </a>
        <a class="flex flex-col items-center justify-center text-blue-600 dark:text-blue-400 border-t-2 border-blue-600 dark:border-blue-400 pt-1 active:scale-95 transition-all"
            href="#">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">add_circle</span>
            <span class="font-medium text-[10px] uppercase tracking-wider">Lend</span>
        </a>
        <a class="flex flex-col items-center justify-center text-zinc-500 dark:text-zinc-400 pt-1 hover:text-blue-500 active:scale-95 transition-all"
            href="#">
            <span class="material-symbols-outlined">person</span>
            <span class="font-medium text-[10px] uppercase tracking-wider">Profile</span>
        </a>
    </nav>
</body>

</html>
